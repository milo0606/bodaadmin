<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión de Invitados</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Standalone) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Compilador JSX en el navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Iconos SVG equivalentes a los que tenías en lucide-react
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconSearch = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const IconSend = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 3 3 9-3 9 19-9ZM6 12h16"/></svg>;
        const IconLoader = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const IconSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;
        const IconCheckSquare = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></svg>;
        const IconCheckCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;

        const parseCSVLine = (text) => {
          let ret = [];
          let inQuote = false;
          let value = '';
          for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (inQuote) {
              if (char === '"') {
                if (i < text.length - 1 && text[i+1] === '"') {
                  value += '"';
                  i++;
                } else {
                  inQuote = false;
                }
              } else {
                value += char;
              }
            } else {
              if (char === '"') {
                inQuote = true;
              } else if (char === ',') {
                ret.push(value.trim());
                value = '';
              } else {
                value += char;
              }
            }
          }
          ret.push(value.trim());
          return ret;
        };

        function App() {
          const sheetUrl = 'https://docs.google.com/spreadsheets/d/1wPHUQlLhRHU9UuzGesFwymXFBP7lCgBGj-8eZ4mD_dw/export?format=csv';
          const googleAppsScriptUrl = 'https://script.google.com/macros/s/AKfycbwCBTcUgK0NbT7zA0BhzE_zOSrnf7oQXc-XynnGjEXD3iwlDgkj2YtMZg1HTR0-FVzYfQ/exec'; 

          const [data, setData] = useState([]);
          const [loading, setLoading] = useState(false);
          const [selectedIds, setSelectedIds] = useState([]);
          const [isProcessingBatch, setIsProcessingBatch] = useState(false);
          const [searchTerm, setSearchTerm] = useState('');
          const [colConfirmado, setColConfirmado] = useState(null);
          
          const messageTemplate = 'Hola {Nombre},\n\nEstamos muy felices de compartir esta noticia con ustedes. 💍💖 Después de mucho amor, risas y sueños juntos 🌟, ha llegado el momento de dar el siguiente paso. \n\nNos encantaría que nos acompañaran en este día tan especial. 🥂✨ Aquí les enviamos nuestra invitación digital y esperamos celebrar juntos. ❤️\n\n💌 Ver invitación: {URL}\n\nCon mucho cariño,\n\nMiguel & Azalia 💕';

          const fetchCSVData = async () => {
            setLoading(true);
            try {
              const response = await fetch(sheetUrl);
              const csvText = await response.text();
              const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
              const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase());
              let nombreIdx = headers.findIndex(h => h.includes('nombre'));
              let numeroIdx = headers.findIndex(h => h.includes('numero') || h.includes('número') || h.includes('tel'));
              let confirmadoIdx = headers.findIndex(h => h.includes('confirmado'));
              
              if (confirmadoIdx !== -1) setColConfirmado(confirmadoIdx + 1);
              
              const parsedData = [];
              for (let i = 1; i < lines.length; i++) {
                const row = parseCSVLine(lines[i]);
                if (row.length > 0 && (row[nombreIdx] || row[numeroIdx])) {
                  parsedData.push({ 
                      id: i, 
                      nombre: row[nombreIdx] || 'Sin nombre', 
                      numero: row[numeroIdx] || '', 
                      invi: '1 persona', 
                      status: 'Pendiente',
                      confirmado: confirmadoIdx !== -1 && row[confirmadoIdx] ? row[confirmadoIdx] : ''
                  });
                }
              }
              setData(parsedData);
            } catch (err) { console.error(err); } finally { setLoading(false); }
          };

          useEffect(() => { fetchCSVData(); }, []);

          const updateStatus = (id, newStatus) => {
            setData(data.map(item => item.id === id ? { ...item, invi: newStatus } : item));
          };

          const toggleSelect = (id) => {
            setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
          };

          const toggleSelectAll = () => {
            setSelectedIds(selectedIds.length === filteredData.length ? [] : filteredData.map(i => i.id));
          };

          const getInvitationUrl = (status) => {
            switch (status) {
              case '1 persona': return 'https://miguelyazalia.site';
              case '2 personas': return 'https://miguelyazalia.site/II.html';
              case '3 personas': return 'https://miguelyazalia.site/III.html';
              case '4 personas': return 'https://miguelyazalia.site/IV.html';
              default: return 'https://miguelyazalia.site';
            }
          };

          const sendWhatsApp = async (item) => {
            let cleanNumber = item.numero.replace(/\D/g, '');
            if (cleanNumber.length === 10) cleanNumber = '1' + cleanNumber;
            else if (cleanNumber.startsWith('001')) cleanNumber = cleanNumber.substring(2);
            
            const url = `https://7107.api.greenapi.com/waInstance7107646919/sendMessage/8ec931b7b199457195010339e5f197706a67ccc34ae84b76ab`;
            const text = messageTemplate.replace(/\{Nombre\}/gi, item.nombre).replace(/\{URL\}/gi, getInvitationUrl(item.invi));

            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatId: `${cleanNumber}@c.us`, message: text })
              });
              
              if (response.ok) {
                if (googleAppsScriptUrl.startsWith('http') && colConfirmado) {
                  const rowToUpdate = item.id + 1; 
                  try {
                    await fetch(`${googleAppsScriptUrl}?row=${rowToUpdate}&col=${colConfirmado}&value=Sí`, { 
                      method: 'GET', 
                      mode: 'no-cors' 
                    });
                  } catch (e) {
                    console.error("No se pudo actualizar el Excel automáticamente", e);
                  }
                }
                return true;
              }
              return false;
            } catch {
              return false;
            }
          };

          const sendBatch = async () => {
            setIsProcessingBatch(true);
            const updatedData = [...data];
            for (const id of selectedIds) {
              const itemIdx = updatedData.findIndex(i => i.id === id);
              if (itemIdx > -1) {
                const success = await sendWhatsApp(updatedData[itemIdx]);
                updatedData[itemIdx].status = success ? 'Entregado' : 'No entregado';
                if (success) {
                    updatedData[itemIdx].confirmado = 'Sí';
                }
              }
            }
            setData(updatedData);
            setIsProcessingBatch(false);
          };

          const filteredData = data.filter(item => 
            item.nombre.toLowerCase().includes(searchTerm.toLowerCase()) || 
            item.numero.includes(searchTerm)
          );

          return (
            <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans">
              <div className="max-w-6xl mx-auto space-y-6">
                <header className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h1 className="text-xl font-bold text-slate-900 flex items-center gap-2"><IconUser/> Gestión de Invitados</h1>
                  
                  <div className="flex items-center gap-4">
                    <div className="relative">
                      <IconSearch className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 h-4 w-4" />
                      <input 
                        type="text" 
                        placeholder="Buscar..." 
                        className="pl-10 pr-4 py-2 border rounded-xl w-64 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                      />
                    </div>
                    
                    <button 
                      onClick={sendBatch}
                      disabled={isProcessingBatch || selectedIds.length === 0}
                      className="bg-[#25D366] text-white px-6 py-2 rounded-xl font-medium flex items-center gap-2 disabled:opacity-50 hover:bg-[#20b858] transition-colors"
                    >
                      {isProcessingBatch ? <IconLoader className="animate-spin h-4 w-4" /> : <IconSend className="h-4 w-4" />}
                      Enviar {selectedIds.length > 0 ? selectedIds.length : ''}
                    </button>
                  </div>
                </header>

                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead className="bg-slate-50 border-b">
                        <tr>
                          <th className="p-4 w-12"><button onClick={toggleSelectAll} className="flex items-center justify-center">{selectedIds.length === filteredData.length && filteredData.length > 0 ? <IconCheckSquare className="text-emerald-600"/> : <IconSquare className="text-slate-400" />}</button></th>
                          <th className="p-4 text-sm font-semibold text-slate-600">Nombre</th>
                          <th className="p-4 text-sm font-semibold text-slate-600">Teléfono</th>
                          <th className="p-4 text-sm font-semibold text-slate-600">Tipo Invitación</th>
                          <th className="p-4 text-sm font-semibold text-slate-600">Status</th>
                          <th className="p-4 text-sm font-semibold text-slate-600">Confirmado</th>
                          <th className="p-4 text-sm font-semibold text-slate-600 text-center">Ws</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filteredData.length === 0 && !loading && (
                           <tr>
                              <td colSpan="7" className="p-8 text-center text-slate-500">No se encontraron invitados.</td>
                           </tr>
                        )}
                        {loading && (
                           <tr>
                              <td colSpan="7" className="p-8 text-center text-slate-500 flex justify-center items-center gap-2">
                                <IconLoader className="animate-spin h-5 w-5" /> Cargando invitados...
                              </td>
                           </tr>
                        )}
                        {filteredData.map(item => (
                          <tr key={item.id} className="border-b hover:bg-slate-50 transition-colors">
                            <td className="p-4">
                              <button onClick={() => toggleSelect(item.id)} className="flex items-center justify-center">
                                {selectedIds.includes(item.id) ? <IconCheckSquare className="text-emerald-600"/> : <IconSquare className="text-slate-400" />}
                              </button>
                            </td>
                            <td className="p-4 font-medium text-slate-800">{item.nombre}</td>
                            <td className="p-4 text-slate-600 text-sm">{item.numero}</td>
                            <td className="p-4">
                              <select 
                                className="border border-slate-200 rounded-lg p-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500" 
                                value={item.invi} 
                                onChange={(e) => updateStatus(item.id, e.target.value)}
                              >
                                <option>1 persona</option>
                                <option>2 personas</option>
                                <option>3 personas</option>
                                <option>4 personas</option>
                              </select>
                            </td>
                            <td className="p-4 text-sm">
                              <span className={`px-2 py-1 rounded-full text-xs font-medium ${item.status === 'Entregado' ? 'bg-emerald-100 text-emerald-700' : item.status === 'No entregado' ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-600'}`}>
                                {item.status}
                              </span>
                            </td>
                            <td className="p-4">
                              {item.confirmado && item.confirmado.toLowerCase().includes('s') ? (
                                <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-medium">
                                  <IconCheckCircle className="h-3 w-3" /> Sí
                                </span>
                              ) : (
                                <span className="text-slate-400 text-sm pl-4">-</span>
                              )}
                            </td>
                            <td className="p-4 text-center">
                              <button 
                                  onClick={async () => {
                                      const success = await sendWhatsApp(item);
                                      setData(data.map(d => d.id === item.id ? {
                                          ...d, 
                                          status: success ? 'Entregado' : 'No entregado',
                                          confirmado: success ? 'Sí' : d.confirmado
                                      } : d));
                                  }} 
                                  className="p-2 hover:bg-emerald-50 rounded-lg transition-colors group mx-auto flex"
                                  title="Enviar mensaje"
                              >
                                  <IconSend className="h-5 w-5 text-[#25D366] group-hover:scale-110 transition-transform" />
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          );
        }
        
        // Renderizar la aplicación React en el div #root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
